@if (vm$ | async; as vm) {
    <div class="actions">
        <app-icon-button
            class="action"
            [selected]="vm.isFavorite"
            [disabled]="vm.pending"
            [ariaLabel]="
                vm.isFavorite
                    ? title + ' is in your favorites'
                    : 'Add ' + title + ' to favorites'
            "
            [matTooltip]="
                vm.isFavorite ? 'Remove from favorites' : 'Add to favorites'
            "
            (onClick)="toggleFavorite()"
        >
            <i
                [class.fa-solid]="vm.isFavorite"
                [class.fa-regular]="!vm.isFavorite"
                class="icon fa-heart"
                aria-hidden="true"
            ></i>
        </app-icon-button>

        <app-icon-button
            class="action"
            [selected]="vm.isInWatchlist"
            [disabled]="vm.pending"
            [ariaLabel]="
                vm.isInWatchlist
                    ? title + ' is on your watchlist'
                    : 'Add ' + title + ' to watchlist'
            "
            [matTooltip]="
                vm.isInWatchlist
                    ? 'Remove from watchlist'
                    : 'Add to watchlist'
            "
            (onClick)="toggleWatchlist()"
        >
            <i
                [class.fa-solid]="vm.isInWatchlist"
                [class.fa-regular]="!vm.isInWatchlist"
                class="icon fa-bookmark"
                aria-hidden="true"
            ></i>
        </app-icon-button>

        <app-icon-button
            class="action"
            [disabled]="vm.pending || listDialogPending()"
            [ariaLabel]="'Add ' + title + ' to one of your lists'"
            [matTooltip]="'Add to one of your lists'"
            (onClick)="openCustomListsDialog()"
        >
            <i class="icon fa-solid fa-list" aria-hidden="true"></i>
        </app-icon-button>
    </div>
}

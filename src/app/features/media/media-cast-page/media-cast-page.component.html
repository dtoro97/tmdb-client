<div class="page-container">
    @if (vm$ | async; as vm) {
        <app-sub-page-header
            [backdropPath]="vm.media?.backdropPath"
            [parentTitle]="vm.media?.title"
            [backLink]="['../']"
            pageTitle="Cast & Crew"
            [subtitle]="vm.media?.title ?? null"
            [loading]="!vm.media"
        />

        <main class="page-main cast-page">
            @if (vm.isEmpty) {
                <app-empty-state
                    class="empty"
                    iconClass="fa-solid fa-sliders"
                    iconStyle="plain"
                    text="No cast or crew information is available for this title."
                />
            } @else {
                <section class="directory">
                    @if (vm.isLoading) {
                        <app-skeleton class="directory__toolbar-skeleton" />
                    } @else {
                        <header class="directory__head">
                            <div class="directory__counts text-card-meta">
                                @if (vm.cast.length) {
                                    <span>
                                        {{ vm.cast.length }}
                                        {{ vm.cast.length === 1 ? 'cast member' : 'cast members' }}
                                    </span>
                                }
                                @if (vm.crew.length) {
                                    <span>
                                        {{ vm.crew.length }}
                                        crew
                                    </span>
                                }
                            </div>

                            <app-pill-toggle
                                [options]="vm.filters"
                                [selectedValue]="visibleSection"
                                variant="subtle"
                                (selected)="onVisibleSectionsChange($event)"
                            />
                        </header>
                    }

                    <app-cast-crew-grid
                        [cast]="vm.cast"
                        [groupedCrew]="vm.groupedCrew"
                        [showCast]="visibleSection === 'cast' && vm.cast.length > 0"
                        [showCrew]="visibleSection === 'crew' || !vm.cast.length"
                        [loading]="vm.isLoading"
                        variant="directory"
                    />
                </section>
            }
        </main>
    }
</div>

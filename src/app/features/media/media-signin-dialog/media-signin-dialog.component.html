<section class="media-signin-dialog">
    <header class="media-signin-dialog__header">
        <h2 class="text-title">Sign in to TMDb</h2>
        <p class="text-body-sm media-signin-dialog__description">
            Track what you love. Create lists, save favorites, and build your
            watchlist.
        </p>
    </header>

    <mat-dialog-actions align="end">
        <button matButton class="text-button" type="button" (click)="cancel()">
            Cancel
        </button>
        <button matButton="filled" type="button" (click)="requestLogin()">
            Sign in with TMDb
        </button>
    </mat-dialog-actions>
</section>

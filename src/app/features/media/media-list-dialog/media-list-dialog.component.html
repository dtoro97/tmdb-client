<div class="media-list-dialog">
    <header class="media-list-dialog__header">
        <h2 class="text-title">Add to a list</h2>
        <p class="text-body-sm media-list-dialog__subtitle">
            Choose a list for {{ data.title }}.
        </p>
    </header>

    <mat-dialog-content class="media-list-dialog__content">
        @if (data.customLists.length) {
            <div
                class="media-list-dialog__list"
                role="listbox"
                aria-label="Your lists"
            >
                @for (list of data.customLists; track list.id) {
                    <button
                        class="media-list-dialog__list-item"
                        [class.media-list-dialog__list-item--present]="list.itemPresent"
                        type="button"
                        role="option"
                        [disabled]="list.itemPresent"
                        [attr.aria-selected]="list.itemPresent ? 'true' : 'false'"
                        [attr.aria-label]="
                            list.itemPresent
                                ? data.title + ' is already in ' + list.name
                                : 'Add ' + data.title + ' to ' + list.name
                        "
                        (click)="selectList(list.id)"
                    >
                        <span class="media-list-dialog__thumb" aria-hidden="true">
                            <app-image [src]="list.posterPath" params="w92" />
                        </span>

                        <span class="media-list-dialog__copy">
                            <span class="media-list-dialog__name text-subtitle">
                                {{ list.name }}
                            </span>
                            <span
                                class="media-list-dialog__description text-body-sm"
                                [class.media-list-dialog__description--empty]="!list.description"
                            >
                                {{ list.description || 'No list description yet.' }}
                            </span>
                        </span>

                        <span class="media-list-dialog__meta">
                            <span class="media-list-dialog__count text-caption u-nowrap">
                                {{ list.itemCount }}
                                {{ list.itemCount === 1 ? 'title' : 'titles' }}
                            </span>
                            @if (list.itemPresent) {
                                <span class="media-list-dialog__status text-caption u-nowrap">
                                    <i class="fa-solid fa-check" aria-hidden="true"></i>
                                    Already in list
                                </span>
                            }
                        </span>
                    </button>
                }
            </div>
        } @else {
            <div class="media-list-dialog__empty">
                <i
                    class="media-list-dialog__empty-icon fa-solid fa-list"
                    aria-hidden="true"
                ></i>
                <p class="text-body-sm">You do not have any lists yet.</p>
            </div>
        }
    </mat-dialog-content>

    <mat-dialog-actions align="end">
        <button matButton class="text-button" type="button" (click)="cancel()">Close list picker</button>
        <button matButton="filled" type="button" (click)="createList()">Create list</button>
    </mat-dialog-actions>
</div>

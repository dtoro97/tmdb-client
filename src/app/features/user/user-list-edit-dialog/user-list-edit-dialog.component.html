<div>
    <header class="user-list-edit-dialog__header">
        <h2 class="user-list-edit-dialog__title text-title">
            Update your list details
        </h2>
        <p class="user-list-edit-dialog__subtitle text-body-sm">
            Refine the title and description that appear on your list page.
        </p>
    </header>

    <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-dialog-content class="user-list-edit-dialog__content">
            <label class="user-list-edit-dialog__field">
                <span class="text-body-sm">List name</span>
                <mat-form-field appearance="outline" subscriptSizing="fixed">
                    <input
                        matInput
                        type="text"
                        formControlName="name"
                        autocomplete="off"
                        placeholder="Weekend picks"
                    />
                    @if (
                        form.controls.name.touched &&
                        form.controls.name.hasError("required")
                    ) {
                        <mat-error>Give your list a name.</mat-error>
                    } @else if (form.controls.name.hasError("maxlength")) {
                        <mat-error>
                            List names can be at most
                            {{ data.maxNameLength ?? 100 }} characters.
                        </mat-error>
                    }
                </mat-form-field>
            </label>

            <label class="user-list-edit-dialog__field">
                <span class="text-body-sm">
                    Description
                    <span class="text-caption">Optional</span>
                </span>
                <mat-form-field
                    appearance="outline"
                    subscriptSizing="dynamic"
                    class="user-list-edit-dialog__description-field"
                >
                    <textarea
                        matInput
                        rows="4"
                        formControlName="description"
                        placeholder="A place for titles worth revisiting."
                    ></textarea>
                    @if (form.controls.description.hasError("maxlength")) {
                        <mat-error>
                            Descriptions can be at most
                            {{ data.maxDescriptionLength ?? 280 }}
                            characters.
                        </mat-error>
                    }
                </mat-form-field>
            </label>

            <mat-checkbox formControlName="isPublic">Public list</mat-checkbox>
        </mat-dialog-content>

        <mat-dialog-actions align="end">
            <button matButton class="text-button" mat-dialog-close>
                Cancel
            </button>
            <button matButton="filled" type="submit">Save changes</button>
        </mat-dialog-actions>
    </form>
</div>

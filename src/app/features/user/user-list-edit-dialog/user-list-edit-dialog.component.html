<div class="dialog">
    <header class="dialog__header">
        <h2 class="text-title">
            Edit list
        </h2>
        <p class="text-body-sm">
            Change the list name, description, visibility, and default order.
        </p>
    </header>

    <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-dialog-content class="dialog__content">
            <label class="dialog__field">
                <span class="text-body-sm">List name</span>
                <mat-form-field appearance="outline" subscriptSizing="fixed">
                    <input
                        matInput
                        type="text"
                        formControlName="name"
                        autocomplete="off"
                        [maxlength]="nameMaxLength"
                        placeholder="Enter a list name"
                    />
                    @if (
                        form.controls.name.touched &&
                        form.controls.name.hasError("required")
                    ) {
                        <mat-error>Give your list a name.</mat-error>
                    } @else if (form.controls.name.hasError("maxlength")) {
                        <mat-error>
                            List names can be at most
                            {{ nameMaxLength }} characters.
                        </mat-error>
                    }
                    <mat-hint align="end">
                        {{ form.controls.name.value.length }} /
                        {{ nameMaxLength }}
                    </mat-hint>
                </mat-form-field>
            </label>

            <label class="dialog__field">
                <span class="dialog__field-label text-body-sm">
                    <span>Description</span>
                    <span class="text-caption">Optional</span>
                </span>
                <mat-form-field
                    appearance="outline"
                    subscriptSizing="dynamic"
                    class="dialog__description-field"
                >
                    <textarea
                        matInput
                        rows="4"
                        formControlName="description"
                        [maxlength]="descriptionMaxLength"
                        placeholder="Add a short description"
                    ></textarea>
                    @if (form.controls.description.hasError("maxlength")) {
                        <mat-error>
                            Descriptions can be at most
                            {{ descriptionMaxLength }} characters.
                        </mat-error>
                    }
                    <mat-hint align="end">
                        {{ form.controls.description.value.length }} /
                        {{ descriptionMaxLength }}
                    </mat-hint>
                </mat-form-field>
            </label>

            @if (showSortSelector) {
                <label class="dialog__field">
                    <span class="text-body-sm">Default order</span>
                    <mat-form-field appearance="outline" subscriptSizing="dynamic">
                        <mat-select formControlName="sortBy">
                            @for (option of sortOptions; track option.value) {
                                <mat-option [value]="option.value">
                                    {{ option.label }}
                                </mat-option>
                            }
                        </mat-select>
                    </mat-form-field>
                </label>
            }

            <fieldset
                class="dialog__properties"
                aria-label="List visibility"
            >
                <div class="dialog__property">
                    <mat-slide-toggle
                        formControlName="isPublic"
                        aria-describedby="edit-list-visibility-description"
                    >
                        Visible on profile
                    </mat-slide-toggle>
                    <span
                        id="edit-list-visibility-description"
                        class="text-caption"
                    >
                        People who can view your profile can see this
                        list.
                    </span>
                </div>
            </fieldset>
        </mat-dialog-content>

        <mat-dialog-actions align="end">
            <button matButton class="text-button" mat-dialog-close>
                Cancel
            </button>
            <button matButton="filled" type="submit">Save changes</button>
        </mat-dialog-actions>
    </form>
</div>

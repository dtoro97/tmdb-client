<article class="user-list-detail-item-card">
    <app-backdrop-card [item]="item"></app-backdrop-card>

    @if (showRemove) {
        <button
            class="user-list-detail-item-card__remove"
            type="button"
            matTooltip="Remove from list"
            matTooltipPosition="above"
            aria-label="Remove item from list"
            (click)="remove.emit(item)"
        >
            <i class="fa-solid fa-xmark" aria-hidden="true"></i>
        </button>
    }
</article>

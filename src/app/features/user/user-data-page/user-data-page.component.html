@if (currentSection$ | async; as currentSection) {
    @switch (currentSection) {
        @case ("profile") {
            <app-user-data-overview-section />
        }
        @case ("watchlists") {
            <app-watchlist-section />
        }
        @case ("favorites") {
            <app-favorites-section />
        }
        @case ("ratings") {
            <app-ratings-section />
        }
        @case ("lists") {
            <app-lists-section />
        }
    }
}

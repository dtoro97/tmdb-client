@if (!loading && spotlight; as s) {
    <app-hero-surface
        variant="detail"
        [backdropPath]="s.backdropPath"
        [alt]="s.title"
    >
        @if (backLink) {
            <a class="spotlight-back text-caption" [routerLink]="backLink">
                <i
                    class="spotlight-back__icon fa-solid fa-chevron-left"
                    aria-hidden="true"
                ></i>
                {{ backLabel }}
            </a>
        }

        <section class="spotlight">
            <div class="spotlight-content">
                <span class="spotlight-badge text-overline">{{ badge }}</span>

                <a
                    class="spotlight-title-link"
                    [routerLink]="['/title', s.id, s.mediaType]"
                >
                    <h1 class="spotlight-title text-hero-title">
                        {{ s.title }}
                    </h1>
                </a>

                <div class="spotlight-meta">
                    @if (s.rating) {
                        <app-rating [value]="s.rating" />
                    }
                    @if (s.mediaTypeLabel) {
                        <span class="spotlight-meta-item text-meta">{{
                            s.mediaTypeLabel
                        }}</span>
                    }
                    @if (s.year) {
                        @if (s.mediaTypeLabel) {
                            <span
                                class="spotlight-meta-divider"
                                aria-hidden="true"
                                >&#x2022;</span
                            >
                        }
                        <span class="spotlight-meta-item text-meta">{{
                            s.year
                        }}</span>
                    }
                </div>

                @if (s.overview) {
                    <p class="spotlight-overview text-body">
                        {{ s.overview }}
                    </p>
                }

                <div class="spotlight-actions">
                    <ng-content />
                    <app-watchlist-toggle
                        variant="labeled"
                        [mediaId]="s.id"
                        [mediaType]="s.mediaType"
                        [title]="s.title"
                    />
                </div>
            </div>
        </section>
    </app-hero-surface>
} @else if (loading) {
    <div class="spotlight-skeleton" aria-hidden="true">
        <div class="spotlight-skeleton-content">
            <div class="spotlight-skeleton-badge skeleton"></div>
            <div class="spotlight-skeleton-title skeleton"></div>
            <div class="spotlight-skeleton-meta skeleton"></div>
            <div class="spotlight-skeleton-overview skeleton"></div>
            <div class="spotlight-skeleton-actions">
                <div class="spotlight-skeleton-button skeleton"></div>
                <div
                    class="spotlight-skeleton-button spotlight-skeleton-button--watchlist skeleton"
                ></div>
            </div>
        </div>
    </div>
}

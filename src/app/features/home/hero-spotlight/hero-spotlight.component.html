@if (!loading && spotlight; as s) {
    <app-hero-surface
        variant="detail"
        [backdropPath]="s.backdropPath"
        [alt]="s.title"
    >
        @if (backLink) {
            <a
                class="hero-spotlight__back-link text-caption"
                [routerLink]="backLink"
            >
                <i
                    class="hero-spotlight__back-icon fa-solid fa-chevron-left"
                    aria-hidden="true"
                ></i>
                {{ backLabel }}
            </a>
        }

        <section class="hero-spotlight">
            <div class="hero-spotlight__content">
                <span class="hero-spotlight__badge text-overline">{{
                    badge
                }}</span>

                <a [routerLink]="['/title', s.id, s.mediaType]">
                    <h1 class="hero-spotlight__title text-hero-title">
                        {{ s.title }}
                    </h1>
                </a>

                <div class="hero-spotlight__meta">
                    @if (s.rating) {
                        <app-rating [value]="s.rating" />
                    }
                    @if (s.mediaTypeLabel) {
                        <span class="hero-spotlight__meta-item text-meta">{{
                            s.mediaTypeLabel
                        }}</span>
                    }
                    @if (s.year) {
                        @if (s.mediaTypeLabel) {
                            <span
                                class="hero-spotlight__meta-divider"
                                aria-hidden="true"
                                >&#x2022;</span
                            >
                        }
                        <span class="hero-spotlight__meta-item text-meta">{{
                            s.year
                        }}</span>
                    }
                </div>

                @if (s.overview) {
                    <p class="hero-spotlight__overview text-body">
                        {{ s.overview }}
                    </p>
                }

                <div class="hero-spotlight__actions">
                    <ng-content />
                    <app-watchlist-toggle
                        [mediaId]="s.id"
                        [mediaType]="s.mediaType"
                        [title]="s.title"
                    />
                </div>
            </div>
        </section>
    </app-hero-surface>
} @else if (loading) {
    <div class="hero-spotlight-skeleton" aria-hidden="true">
        <div class="hero-spotlight-skeleton__content">
            <div class="hero-spotlight-skeleton__badge skeleton"></div>
            <div class="hero-spotlight-skeleton__title skeleton"></div>
            <div class="hero-spotlight-skeleton__meta skeleton"></div>
            <div class="hero-spotlight-skeleton__overview skeleton"></div>
            <div class="hero-spotlight-skeleton__actions">
                <div class="hero-spotlight-skeleton__button skeleton"></div>
                <div
                    class="hero-spotlight-skeleton__button hero-spotlight-skeleton__button--watchlist skeleton"
                ></div>
            </div>
        </div>
    </div>
}

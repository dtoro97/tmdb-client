<article class="discover-card">
    <a class="discover-card__link" [routerLink]="link" [attr.aria-label]="'Open ' + item.title">
        <div class="discover-card__poster">
            <app-image
                class="discover-card__image"
                [src]="item.thumb"
                [alt]="item.title"
                type="media"
                params="w342"
            />
        </div>

        <div class="discover-card__body">
            <h2 class="discover-card__title text-subtitle">{{ item.title }}</h2>

            <div class="discover-card__meta text-caption">
                @if (item.date) {
                    <span>{{ item.date | date: 'yyyy' }}</span>
                }

                @if (item.rating !== null) {
                    <app-rating class="discover-card__rating" [value]="item.rating" />
                }
            </div>

            @if (genreNames.length) {
                <p class="discover-card__genres text-caption">
                    @for (genreName of genreNames; track genreName; let last = $last) {
                        <span>{{ genreName }}</span>
                        @if (!last) {
                            <span class="discover-card__genre-separator" aria-hidden="true">/</span>
                        }
                    }
                </p>
            }
        </div>
    </a>

    <div class="discover-card__actions" role="group" [attr.aria-label]="'Actions for ' + item.title">
        <app-favorite-toggle
            [mediaId]="item.id"
            [mediaType]="item.mediaType"
            [title]="item.title"
        />

        <app-watchlist-toggle
            [mediaId]="item.id"
            [mediaType]="item.mediaType"
            [title]="item.title"
            [iconOnly]="true"
        />
    </div>
</article>

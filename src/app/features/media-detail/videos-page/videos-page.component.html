<div class="videos-page pb-8">
    @if (mediaStoreService.viewModel$ | async; as vm) {
        <app-sub-page-banner
            [backdropPath]="vm.backdropPath"
            [parentTitle]="vm.title"
            [backLink]="['../']"
            pageTitle="Videos"
        />

        <div class="inner-container pt-5">
            @if (videos$ | async; as videos) {
                <div class="sort-bar mb-5">
                    <span class="sort-bar-count muted">{{
                        (countLabel$ | async) ?? ""
                    }}</span>
                    <app-sort-button
                        [options]="sortOptions"
                        [selectedValue]="sortField$ | async"
                        [direction]="(sortDirection$ | async) ?? 'desc'"
                        (sortChange)="setSortField($event)"
                        (directionToggle)="toggleSortDirection()"
                    />
                </div>

                <div class="video-grid">
                    @for (video of videos; track video.id) {
                        <app-youtube-video
                            [video]="video"
                            [mediaTitle]="vm.title"
                            [mediaYear]="vm.year"
                            [mediaId]="vm.id"
                            [mediaType]="vm.mediaType"
                            [navigateToVideoDetail]="true"
                            [showOfficialBadge]="true"
                            [showPublishedDate]="true"
                            [showQuality]="true"
                            variant="card"
                        />
                    }
                </div>
            }
        </div>
    }
</div>

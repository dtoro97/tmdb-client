<article class="review-card">
    <header class="review-card__header">
        @if (avatarPath; as avatarPath) {
            <img
                class="review-card__avatar"
                [src]="avatarPath | imgSrc: 'w185'"
                [alt]="displayName"
            />
        } @else {
            <div class="review-card__avatar review-card__avatar--fallback">
                {{ fallbackInitial }}
            </div>
        }

        <div class="review-card__meta">
            <div class="review-card__meta-top">
                <h3 class="review-card__author text-body-sm">
                    {{ displayName }}
                </h3>

                @if (userRating !== null) {
                    <app-rating-badge [value]="userRating" />
                } @else {
                    <span class="text-caption"> No user rating </span>
                }
            </div>

            @if (createdAt) {
                <p class="text-caption">
                    {{ createdAt | date: "MMM d, y" }}
                </p>
            }
        </div>
    </header>

    <div class="review-card__body">
        <p
            class="review-card__content text-body"
            [class.review-card__content--collapsed]="!expanded"
            [innerHTML]="contentHtml"
        ></p>

        @if (canExpand || expanded) {
            <button
                class="review-card__toggle text-caption"
                type="button"
                (click)="toggleExpanded()"
            >
                {{ expanded ? "Show less" : "Read more" }}
            </button>
        }
    </div>
</article>

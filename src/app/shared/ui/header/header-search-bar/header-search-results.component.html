@if (state.type === "loading") {
    <ul class="header-search-results u-list-none" aria-hidden="true">
        @for (_ of skeletonRows; track $index) {
            <li class="header-search-results__row">
                <div class="header-search-results__item">
                    <app-skeleton class="header-search-results__thumb header-search-results__thumb--skeleton" />
                    <div class="header-search-results__content u-flex-1 u-flex-column u-gap-1">
                        <div class="header-search-results__meta">
                            <app-skeleton class="header-search-results__skeleton-chip" />
                            <app-skeleton
                                class="header-search-results__skeleton-line header-search-results__skeleton-line--xs"
                            />
                        </div>
                        <app-skeleton
                            class="header-search-results__title header-search-results__skeleton-line header-search-results__skeleton-line--title"
                        />
                        <app-skeleton
                            class="header-search-results__overview header-search-results__skeleton-line header-search-results__skeleton-line--md"
                        />
                        <app-skeleton
                            class="header-search-results__overview header-search-results__skeleton-line header-search-results__skeleton-line--sm"
                        />
                    </div>
                </div>
            </li>
        }
    </ul>
} @else if (state.type === "loaded") {
    <ul class="header-search-results u-list-none">
        @for (item of state.value; track item.id) {
            <li class="header-search-results__row">
                <button
                    type="button"
                    class="header-search-results__item header-search-results__action"
                    (click)="selectResult(item)"
                >
                    <app-image
                        class="header-search-results__thumb"
                        [src]="item.thumb"
                        [type]="item.mediaType === 'person' ? 'person' : 'media'"
                        [alt]="item.title"
                    />
                    <div class="header-search-results__content u-flex-1 u-flex-column u-gap-1">
                        <div class="header-search-results__meta">
                            <app-badge [label]="item.mediaTypeLabel" />
                            @if (item.year) {
                                <span class="text-card-meta">{{ item.year }}</span>
                            }
                            @if (item.rating && item.rating > 0) {
                                <app-rating class="header-search-results__rating" [value]="item.rating" />
                            }
                            @if (item.department) {
                                <span class="text-card-meta">
                                    {{ item.department }}
                                </span>
                            }
                        </div>
                        <p class="header-search-results__title text-card-title">
                            {{ item.title }}
                        </p>
                        @if (item.overview) {
                            <p class="header-search-results__overview text-card-meta">
                                {{ item.overview }}
                            </p>
                        }
                        @if (item.mediaType === "person" && item.known_for) {
                            <p class="header-search-results__known-for text-card-meta">
                                {{ item.known_for }}
                            </p>
                        }
                    </div>
                </button>
            </li>
        }
    </ul>
}

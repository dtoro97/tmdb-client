<header class="header" #headerEl>
    <nav aria-label="Primary">
        <div class="header-inner inner-container">
            <a class="header-brand" routerLink="/">
                <mat-icon class="header-brand-icon">movie</mat-icon>
                <span class="header-brand-text">TMDB</span>
            </a>

            <ul class="header-nav">
                @for (link of navLinks; track link.label) {
                    <li>
                        <a
                            class="header-nav-link text-body-sm"
                            [routerLink]="link.routerLink"
                            [queryParams]="link.queryParams"
                            routerLinkActive="header-nav-link--active"
                            [routerLinkActiveOptions]="link.activeOptions"
                            [attr.aria-current]="rla.isActive ? 'page' : null"
                            #rla="routerLinkActive"
                        >
                            {{ link.label }}
                        </a>
                    </li>
                }
            </ul>

            <div class="header-search">
                <app-header-search-bar />
            </div>

            <app-header-locale-selector />

            <button
                class="header-menu-button"
                type="button"
                aria-haspopup="true"
                [attr.aria-expanded]="menuOpen"
                (click)="toggleMenu()"
            >
                <mat-icon class="header-menu-button-icon">menu</mat-icon>
            </button>
        </div>
    </nav>

    @if (menuOpen) {
        <div class="header-mobile-menu" role="group" aria-label="Navigation">
            <div class="header-mobile-menu-inner inner-container">
                <ul class="header-mobile-menu-list">
                    <li>
                        <a
                            class="header-mobile-menu-link text-body-sm"
                            routerLink="/"
                            (click)="onNavLinkClick()"
                        >
                            <mat-icon>home</mat-icon>
                            <span>Home</span>
                        </a>
                    </li>
                    @for (link of navLinks; track link.label) {
                        <li>
                            <a
                                class="header-mobile-menu-link text-body-sm"
                                [routerLink]="link.routerLink"
                                [queryParams]="link.queryParams"
                                routerLinkActive="header-mobile-menu-link--active"
                                [routerLinkActiveOptions]="link.activeOptions"
                                [attr.aria-current]="mobileRla.isActive ? 'page' : null"
                                #mobileRla="routerLinkActive"
                                (click)="onNavLinkClick()"
                            >
                                {{ link.label }}
                            </a>
                        </li>
                    }
                </ul>
            </div>
        </div>
    }
</header>

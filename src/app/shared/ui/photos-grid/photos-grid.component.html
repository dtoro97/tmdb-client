@if (isLoading) {
    <div class="photos-grid">
        <div class="photos-grid__row photos-grid__row--skeleton">
            @for (i of firstRowCount | repeat; track i) {
                <app-skeleton class="photos-grid__skeleton-tile photos-grid__skeleton-tile--wide" />
            }
        </div>
        <div class="photos-grid__row photos-grid__row--skeleton">
            @for (i of skeletonSecondRowCount | repeat; track i) {
                <app-skeleton class="photos-grid__skeleton-tile" />
            }
        </div>
    </div>
} @else if (gridItems.length) {
    <div class="photos-grid">
        @for (item of gridItems; track item.image.file_path) {
            <button
                type="button"
                class="photos-grid__item"
                [style.--photos-grid-aspect-ratio]="item.aspectRatio"
                (click)="photoClick.emit(item.clickIndex)"
            >
                <img class="photos-grid__image" [src]="item.image.file_path ?? '' | imgSrc" alt="" />
                @if (item.moreCount; as moreCount) {
                    <div class="photos-grid__more">+{{ moreCount > 99 ? 99 : moreCount }}</div>
                }
            </button>
        }
        <span class="photos-grid__spacer" aria-hidden="true"></span>
        <span class="photos-grid__spacer" aria-hidden="true"></span>
        <span class="photos-grid__spacer" aria-hidden="true"></span>
    </div>
}

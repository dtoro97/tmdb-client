@if (loading) {
    <div class="card" aria-hidden="true">
        <div class="photo">
            <app-skeleton class="photo-fill" />
        </div>

        <app-skeleton class="name name-skeleton text-subtitle" />
        <app-skeleton class="subtitle-skeleton text-caption" />

        @if (rank !== null) {
            <app-skeleton class="rank-skeleton text-label" />
        }
    </div>
} @else if (person; as person) {
    <a class="card" [routerLink]="['/name', person.id]">
        <app-image
            class="photo"
            [src]="person.imagePath"
            type="person"
            [alt]="person.name"
            params="w185"
        />

        <span class="name text-subtitle">{{ person.name }}</span>

        <span class="text-caption">
            @if (person.subtitle) {
                {{ person.subtitle }}
            } @else {
                unknown
            }
        </span>

        @if (rank !== null) {
            <app-badge [label]="'#' + rank" variant="rank" />
        }
    </a>
}

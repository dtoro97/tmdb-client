@if (loading) {
    <div class="card" aria-hidden="true">
        <div class="photo">
            <app-skeleton class="photo-fill" />
        </div>

        <app-skeleton class="name name-skeleton text-card-title" />
        <app-skeleton class="subtitle-skeleton text-card-meta" />
    </div>
} @else if (person; as person) {
    <a class="card" [routerLink]="['/name', person.id]">
        <app-image
            class="photo"
            [src]="person.imagePath"
            type="person"
            [alt]="person.name"
            params="w185"
        />

        <span class="name text-card-title">{{ person.name }}</span>

        <span class="subtitle text-card-meta">
            @if (person.subtitle) {
                {{ person.subtitle }}
            } @else {
                unknown
            }
        </span>
    </a>
}

<div class="youtube-player">
    <div class="youtube-player__frame aspect-landscape">
        <iframe
            class="youtube-player__embed"
            [src]="video | yt"
            [title]="video.name"
            loading="lazy"
            referrerpolicy="strict-origin-when-cross-origin"
            allow="
                accelerometer;
                autoplay;
                clipboard-write;
                encrypted-media;
                gyroscope;
                picture-in-picture;
                web-share;
            "
            allowfullscreen
        ></iframe>
    </div>
</div>

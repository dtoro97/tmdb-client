<div class="person-list-item" role="listitem">
    <span class="person-list-item__index text-caption">{{ index }}.</span>

    <app-image
        class="person-list-item__avatar"
        [src]="person.thumb"
        [alt]="''"
        type="person"
    />

    <div class="person-list-item__content">
        <div class="person-list-item__primary">
            <a
                class="person-list-item__title text-subtitle"
                [routerLink]="['/name', person.id]"
            >
                {{ person.title }}
            </a>

            @if (person.department) {
                <span class="person-list-item__department text-caption">
                    {{ person.department }}
                </span>
            }
        </div>

        @if (person.knownForLinks.length) {
            <p class="person-list-item__known-for text-meta">
                <span class="person-list-item__known-for-label">Known for </span>
                @for (
                    kf of person.knownForLinks;
                    track kf.id;
                    let last = $last
                ) {
                    <a
                        class="person-list-item__known-for-link"
                        [routerLink]="['/title', kf.id, kf.mediaType]"
                    >
                        {{ kf.title }}
                    </a>
                    @if (!last) {
                        <span>, </span>
                    }
                }
            </p>
        }
    </div>
</div>

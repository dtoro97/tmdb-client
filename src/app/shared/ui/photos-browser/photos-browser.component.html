<div class="photos-browser">
    @if (vm(); as vm) {
        @if (vm.hasImages) {
            <app-browse-toolbar>
                <div start class="photos-browser__toolbar-start">
                    <span class="text-meta u-nowrap">{{ vm.visibleCountLabel }}</span>
                    @if (vm.typePillOptions.length) {
                        <app-toggle-group
                            class="photos-browser__filters"
                            [options]="vm.typePillOptions"
                            [multiple]="true"
                            [selectedValues]="vm.selectedTypes"
                            (selected)="setSelectedTypes($event)"
                        />
                    }
                </div>
                <app-sort-button
                    end
                    [options]="sortOptions"
                    [selectedValue]="vm.sortField"
                    [direction]="vm.sortDirection"
                    (sortChange)="setSortField($event)"
                    (directionToggle)="toggleSortDirection()"
                />
            </app-browse-toolbar>
        }

        @if (vm.cards.length) {
            <div class="photos-browser__grid">
                @for (card of vm.cards; track card.image.file_path; let i = $index) {
                    <button
                        type="button"
                        class="photos-browser__card"
                        [style.--photo-aspect-ratio]="card.layoutAspectRatio"
                        (click)="onImageClick(i, vm.images)"
                    >
                        <app-image
                            class="photos-browser__image"
                            [src]="card.image.file_path"
                            [params]="card.thumbnailSize"
                            type="media"
                            alt=""
                        />
                    </button>
                }
                <span class="photos-browser__spacer" aria-hidden="true"></span>
                <span class="photos-browser__spacer" aria-hidden="true"></span>
                <span class="photos-browser__spacer" aria-hidden="true"></span>
            </div>

            @if (vm.hasMore) {
                <div class="u-flex u-justify-center">
                    <button mat-stroked-button type="button" (click)="showMore()">Show more photos</button>
                </div>
            }
        } @else {
            <div class="empty-panel">
                <app-empty-state iconClass="fa-regular fa-images" text="No photos added yet." />
            </div>
        }
    }
</div>

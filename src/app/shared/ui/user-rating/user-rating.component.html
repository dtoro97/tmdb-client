<button
    class="user-rating"
    type="button"
    [class.user-rating--rated]="currentRating !== null"
    [class.user-rating--pending]="pending"
    [disabled]="disabled"
    [attr.aria-busy]="loading || pending ? 'true' : null"
    (click)="onClick()"
>
    <span class="text-overline">Your rating</span>

    @if (loading) {
        <app-skeleton class="user-rating__skeleton" aria-hidden="true" />
    } @else {
        <span class="user-rating__summary">
            <i
                class="user-rating__icon fa-star"
                [class.fa-solid]="currentRating !== null"
                [class.fa-regular]="currentRating === null"
                aria-hidden="true"
            ></i>

            <span class="user-rating__value text-subtitle">
                @if (currentRating !== null) {
                    {{ currentRating | number: '1.1-1' }}
                    <span class="user-rating__scale text-caption">/10</span>
                } @else {
                    Rate
                }
            </span>
        </span>
    }
</button>

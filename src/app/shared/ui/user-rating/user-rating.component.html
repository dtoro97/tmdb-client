@if (vm$ | async; as vm) {
    <button
        class="user-rating"
        type="button"
        [class.user-rating--rated]="vm.currentRating !== null"
        [class.user-rating--pending]="vm.pending"
        [disabled]="vm.disabled"
        [attr.aria-busy]="vm.disabled ? 'true' : null"
        (click)="open()"
    >
        <span class="text-overline">Your rating</span>

        @if (vm.loading) {
            <app-skeleton class="user-rating__skeleton" aria-hidden="true" />
        } @else {
            <span class="user-rating__summary">
                <i
                    class="user-rating__icon fa-star"
                    [class.fa-solid]="vm.currentRating !== null"
                    [class.fa-regular]="vm.currentRating === null"
                    aria-hidden="true"
                ></i>

                <span class="user-rating__value text-subtitle">
                    @if (vm.currentRating !== null) {
                        {{ vm.currentRating | number: '1.1-1' }}
                        <span class="user-rating__scale text-caption">/10</span>
                    } @else {
                        Rate
                    }
                </span>
            </span>
        }
    </button>
}

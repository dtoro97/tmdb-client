<div class="media-list">
    @if (state.type === 'loading') {
        <ng-container *ngTemplateOutlet="skeleton; context: { $implicit: skeletonCount }" />
    } @else if (state.type === 'loaded' || state.type === 'loading-more') {
        @for (entry of displayItems; track entry.item.id) {
            <app-media-list-item
                [item]="entry.item"
                [genreNames]="entry.genreNames"
                [userRating]="entry.userRating"
                [routerLink]="entry.routerLink"
                [index]="entry.index"
            />
        }
        @if (state.type === 'loading-more') {
            <ng-container *ngTemplateOutlet="skeleton; context: { $implicit: state.placeholderCount }" />
        }
    }
</div>

<ng-template #skeleton let-count>
    @for (i of count | repeat; track i) {
        <div class="media-list__skeleton-row">
            @if (showIndex) {
                <app-skeleton class="media-list__index-skeleton" />
            }
            <app-skeleton class="media-list__poster-skeleton" />
            <div class="media-list__content-skeleton">
                <app-skeleton class="media-list__line media-list__line--title" />
                <app-skeleton class="media-list__line media-list__line--meta" />
                <app-skeleton class="media-list__line media-list__line--body" />
                <app-skeleton class="media-list__line media-list__line--body-short" />
                <app-skeleton class="media-list__line media-list__line--cast" />
            </div>
        </div>
    }
</ng-template>

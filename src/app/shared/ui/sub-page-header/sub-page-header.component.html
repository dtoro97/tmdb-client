<header class="sub-page-header">
    @if (backLink) {
        <a
            class="sub-page-header__back-link text-caption"
            [routerLink]="backLink"
        >
            <i
                class="sub-page-header__back-icon fa-solid fa-chevron-left"
                aria-hidden="true"
            ></i>
            @if (parentTitle) {
                Back to {{ parentTitle }}
            } @else {
                Back
            }
        </a>
    }

    <div class="sub-page-header__content">
        @if (pageTitle) {
            <div class="sub-page-header__title-row">
                <h1 class="sub-page-header__title text-headline">
                    {{ pageTitle }}
                </h1>
                @if (titleIconClass) {
                    <i
                        [attr.class]="'sub-page-header__title-icon ' + titleIconClass"
                        [attr.aria-label]="titleIconLabel"
                        [attr.title]="titleIconLabel"
                    ></i>
                }
            </div>
        } @else if (loading) {
            <app-skeleton class="sub-page-header__title-skeleton" />
        }

        @if (subtitle) {
            <p class="text-meta">
                {{ subtitle }}
            </p>
        } @else if (loading) {
            <app-skeleton class="sub-page-header__subtitle-skeleton" />
        }
    </div>
</header>

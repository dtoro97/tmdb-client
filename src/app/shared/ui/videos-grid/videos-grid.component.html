@if (state; as videosState) {
    @if (videosState.state === "loading") {
        <div class="videos-grid__section">
            @for (index of gridCount | repeat; track index) {
                <ng-container *ngTemplateOutlet="skeletonCard" />
            }
        </div>
    } @else if (videosState.state === "success") {
        @if (videosState.data.length) {
            <div class="videos-grid__section">
                @for (item of videosState.data | slice: 0 : gridCount; track item.id) {
                    <app-video-card [item]="item" />
                }
            </div>
        }
    }
}

<ng-template #skeletonCard>
    <div class="videos-grid__skeleton-card">
        <app-skeleton class="videos-grid__skeleton-art aspect-landscape" />
        <app-skeleton class="videos-grid__skeleton-line" />
        <app-skeleton class="videos-grid__skeleton-line videos-grid__skeleton-line--short" />
    </div>
</ng-template>

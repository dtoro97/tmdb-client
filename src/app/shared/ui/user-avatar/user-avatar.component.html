<span class="user-avatar" [class.user-avatar--lg]="size === 'lg'" [attr.aria-label]="avatarPath ? null : name">
    @if (avatarPath) {
        <app-image class="user-avatar__image" [src]="avatarPath" [alt]="name" type="person" params="w185" />
    } @else {
        <span class="user-avatar__fallback" aria-hidden="true">
            {{ initials }}
        </span>
    }
</span>

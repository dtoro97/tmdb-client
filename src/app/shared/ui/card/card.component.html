@if (item) {
    <a class="card" [routerLink]="['/title', item.id, item.mediaType]">
        <div class="card__media">
            <app-image
                class="card__image"
                [src]="item.imagePath"
                [alt]="item.title"
            />

            @if (showRating && item.rating) {
                <app-rating-badge class="card__rating" [value]="item.rating" />
            }
        </div>

        <div class="card__content">
            <span class="card__title text-body-sm">{{ item.title }}</span>

            @if (item.date) {
                <span class="card__meta text-caption">
                    {{
                        item.date
                            | date
                                : (dateFormat === "dayMonth"
                                      ? "dd MMM"
                                      : "yyyy")
                    }}
                </span>
            }

            @if (item.role) {
                <span class="card__role text-caption">{{ item.role }}</span>
            }
        </div>
    </a>
}

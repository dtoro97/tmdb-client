@if (items$ | async; as items) {
    @if (items.length) {
        <section class="recently-viewed u-flex u-flex-column u-gap-3" aria-labelledby="recently-viewed-title">
            <div class="recently-viewed__header u-flex u-items-center u-space-between u-gap-3">
                <h2 id="recently-viewed-title" class="recently-viewed__title text-title">Recently viewed</h2>

                <button class="recently-viewed__clear text-body-sm" type="button" (click)="clearAll()">Clear all</button>
            </div>

            <app-carousel ariaLabel="Recently viewed titles and people" [columns]="6" [items]="items">
                <ng-template let-item>
                    @if (item.kind === 'person') {
                        <app-person-card [person]="item" />
                    } @else {
                        <app-card [item]="item" [showRating]="false" />
                    }
                </ng-template>
            </app-carousel>
        </section>
    }
}

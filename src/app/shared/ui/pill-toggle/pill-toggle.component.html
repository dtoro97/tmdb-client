<div class="pill-toggle">
    @for (option of options; track option.value) {
        <button
            type="button"
            class="pill-btn"
            [class.active]="
                multiple
                    ? selectedValues.includes(option.value)
                    : selectedValue === option.value
            "
            (click)="onClick(option.value)"
        >
            {{ option.label }}
        </button>
    }
</div>

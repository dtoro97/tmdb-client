<section
    class="hero-surface"
    [class.hero-surface--detail]="variant === 'detail'"
    [class.hero-surface--compact]="variant === 'compact'"
    [class.hero-surface--has-backdrop]="!!backdropPath"
>
    @if (backdropPath) {
        <div class="hero-surface__base"></div>
        <app-image
            class="hero-surface__backdrop-blur"
            [src]="backdropPath"
            params="w780"
            alt=""
        />
        <app-image
            class="hero-surface__backdrop"
            [src]="backdropPath"
            params="w1280"
            [alt]="alt"
        />
        <div class="hero-surface__overlay"></div>
    }

    <div class="hero-surface__content">
        <div class="hero-surface__container">
            <ng-content />
        </div>
    </div>
</section>

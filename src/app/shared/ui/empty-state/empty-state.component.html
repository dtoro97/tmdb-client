<div class="empty-state">
    <span
        class="empty-state__icon-shell"
        [class.empty-state__icon-shell--plain]="iconStyle === 'plain'"
        aria-hidden="true"
    >
        <i class="empty-state__icon {{ iconClass }}"></i>
    </span>

    <div class="empty-state__content">
        @if (title) {
            <p class="empty-state__title text-body-sm">{{ title }}</p>
        }

        <p class="empty-state__text text-body-sm">{{ text }}</p>
    </div>
</div>

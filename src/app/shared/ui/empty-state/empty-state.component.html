<div class="empty-state u-flex-column u-items-center u-gap-4">
    <span
        class="empty-state__icon-shell"
        [class.empty-state__icon-shell--plain]="iconStyle === 'plain'"
        aria-hidden="true"
    >
        <i class="empty-state__icon {{ iconClass }}"></i>
    </span>

    <div class="empty-state__content u-flex-column u-gap-1">
        @if (title) {
            <p class="empty-state__title text-title">{{ title }}</p>
        }

        <p class="empty-state__text text-body-sm">{{ text }}</p>
    </div>
</div>

<section class="not-found" aria-labelledby="not-found-title">
    <div class="not-found__layout">
        <div class="not-found__content">
            <span class="not-found__code text-card-meta">404</span>

            <div class="not-found__message u-flex-column u-gap-3">
                <h1 id="not-found-title" class="text-display">Page not found</h1>
                <p class="text-body">
                    We could not find that page. The link may be outdated, or the title may have moved.
                </p>
            </div>

            <div class="not-found__actions u-flex u-items-center u-gap-3">
                <a matButton="filled" [routerLink]="['/']">
                    <i class="fa-solid fa-house" aria-hidden="true"></i>
                    Home
                </a>
                <a matButton class="text-button" [routerLink]="['/discover']">
                    <i class="fa-solid fa-compass" aria-hidden="true"></i>
                    Browse titles
                </a>
            </div>

            <nav class="not-found__links" aria-label="Suggested pages">
                <a [routerLink]="['/search']">Search</a>
                <a [routerLink]="['/movies']">Movies</a>
                <a [routerLink]="['/tv']">TV shows</a>
            </nav>
        </div>

        <div class="not-found__mark" aria-hidden="true">404</div>
    </div>
</section>

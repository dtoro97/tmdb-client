<article class="video-card aspect-poster">
    <app-image
        class="video-card__poster"
        [src]="item.mediaPosterPath"
        [alt]="item.mediaTitle"
    />

    <button
        type="button"
        class="video-card__play-button"
        [attr.aria-label]="item.openVideoLabel"
        (click)="openVideo()"
    >
        <span class="video-card__play-icon" aria-hidden="true">
            <i class="fa-solid fa-play"></i>
        </span>
    </button>

    <footer class="video-card__overlay">
        <p class="video-card__title">
            <a
                class="video-card__media-link text-body-sm"
                [routerLink]="item.mediaLink"
            >
                {{ item.mediaTitle }}
                @if (item.mediaYear) {
                    <span class="video-card__media-year text-caption">
                        ({{ item.mediaYear }})
                    </span>
                }
            </a>
        </p>

        <span class="video-card__video-type text-caption">
            {{ item.videoTypeLabel }}
        </span>
    </footer>
</article>

<section class="tmdb-signin-dialog">
    <header class="tmdb-signin-dialog__header">
        <h2 class="text-title">{{ title }}</h2>
        <p class="text-body-sm tmdb-signin-dialog__description">
            {{ description }}
        </p>
    </header>

    <mat-dialog-actions align="end">
        <button matButton class="text-button" type="button" (click)="cancel()">Cancel</button>
        <button matButton="filled" type="button" [disabled]="pending()" (click)="requestLogin()">
            {{ actionLabel }}
        </button>
    </mat-dialog-actions>
</section>

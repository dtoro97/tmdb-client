<app-carousel
    [items]="
        state.state === 'loading'
            ? (skeletonCount | repeat)
            : state.state === 'success' || state.state === 'loading-more'
              ? state.data
              : []
    "
>
    <ng-template let-person>
        <app-person-card [person]="person" [loading]="state.state === 'loading'" />
    </ng-template>
</app-carousel>

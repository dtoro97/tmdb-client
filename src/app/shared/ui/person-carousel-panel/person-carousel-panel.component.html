<app-carousel
    [items]="
        state.type === 'loading'
            ? (skeletonCount | repeat)
            : state.type === 'loaded' || state.type === 'loading-more'
              ? state.value
              : []
    "
>
    <ng-template let-person>
        <app-person-card [person]="person" [loading]="state.type === 'loading'" />
    </ng-template>
</app-carousel>

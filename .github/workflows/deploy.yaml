name: Deploy Angular to GitHub Pages

on:
    push:
        branches:
            - main

permissions:
    contents: write

jobs:
    build-deploy:
        runs-on: ubuntu-latest
        environment: github-pages

        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
            - name: Debug lockfile
              run: |
                  node -v
                  npm -v
                  grep -n '"chokidar"' package-lock.json || true
                  grep -n '"readdirp"' package-lock.json || true
                  grep -n '"picomatch"' package-lock.json || true
            - name: Install dependencies
              run: npm ci

            - name: Inject API key for production build
              run: |
                  sed -i "s|\${API_KEY}|${{ secrets.API_KEY }}|g" \
                  src/environments/environment.ts

            - name: Build Angular app
              run: |
                  npx ng build \
                  --configuration production \
                  --base-href https://dtoro97.github.io/tmdb-client/

            - name: Deploy to gh-pages
              run: |
                  npx angular-cli-ghpages \
                  --no-silent \
                  --name "github-actions[bot]" \
                  --email "41898282+github-actions[bot]@users.noreply.github.com" \
                  --message "deploy: publish production build" \
                  --dir=dist/tmdb-client/browser
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
